# profile.yml — human-maintained source of truth for the generated GitHub
# profile README. Edit this file, then regenerate with:
#
#   GITHUB_TOKEN=$(gh auth token) python scripts/generate-readme.py
#
# README.md is generated output. Do not edit it by hand.

owner: kevinpinscoe
name: Kevin P. Inscoe
summary: Software engineer, SRE, infrastructure builder, and technical hobbyist

repository_defaults:
  include_archived: false
  include_forks: false

# Category order here is the order sections appear in the README.
# Each category maps to exactly one controlled `area-*` topic.
categories:
  - name: Compute Infrastructure and Site Reliability Engineering
    topic: area-infrastructure-sre
    description: AWS, Azure, Kubernetes, infrastructure as code, observability, and operational tooling.
    subjects:
      - AWS
      - Azure
      - Kubernetes
      - Infrastructure as Code (IaC)
      - Observability
      - Operational tooling

  - name: Playbooks and Skill Demonstration
    topic: area-playbooks
    description: Playbooks, conventions, and example code that demonstrate how I work.
    subjects:
      - Playbooks
      - Example code

  - name: Proof of Concept and Moonshot Projects
    topic: area-proof-of-concept
    description: Experiments, sandboxes, and difficult long-term projects.
    subjects:
      - Proof of concept
      - Moonshot projects

  - name: Software Development
    topic: area-software-development
    description: Go, Python, command-line tools, and developer tooling.
    subjects:
      - Go
      - Python
      - Developer tools

  - name: Distribution
    topic: area-distribution
    description: Package manager repositories and software distribution channels for the tools I publish (Homebrew, Scoop, APT, RPM, AppImage).
    subjects:
      - Package manager repositories
      - Software distribution channels

  - name: AI
    topic: area-ai
    description: AI skills, automation, and tooling built around Claude Code and other assistants.
    subjects:
      - AI skills
      - AI automation and tooling

  - name: Tools
    topic: area-tools
    description: Command-line utilities and helper tools.
    subjects:
      - Command-line tools
      - Utilities

  - name: Applications
    topic: area-applications
    description: Web applications, desktop tools, and GUI utilities.
    subjects:
      - Web applications
      - Desktop and GUI tools

  - name: Hardware
    topic: area-hardware
    description: Raspberry Pi, discrete I/O, and device-level programming.
    subjects:
      - Raspberry Pi
      - Discrete I/O and devices

  - name: Knowledge Management
    topic: area-knowledge-management
    description: PKM, PCM, documentation, and information organization.
    subjects:
      - Personal knowledge management (PKM)
      - Personal content management (PCM)
      - Documentation tools

  - name: Publishing and Markdown
    topic: area-publishing-markdown
    description: Book publishing, documentation sources, and Markdown authoring tools.
    subjects:
      - Book publishing
      - Markdown authoring

  - name: Amateur Radio
    topic: area-amateur-radio
    description: Amateur radio programming, archives, and references.
    subjects:
      - Amateur radio programming
      - Radio archives and references

  - name: Weather
    topic: area-weather
    description: Weather reporting, instrumentation, and decoding.
    subjects:
      - Weather reporting
      - Weather instrumentation
      - Weather decoding

  - name: Project and Task Management
    topic: area-project-management
    description: Project tracking, issue management, and workflow tooling.
    subjects:
      - Issue and project tracking
      - Workflow tooling

  - name: Outliers
    topic: area-outliers
    description: Profile, meta, and uncategorized repositories.
    subjects:
      - Profile and meta repositories
      - Uncategorized projects

repositories:
  # Never appear in the catalog.
  exclude:
    - kevinpinscoe        # this profile repo itself

  # Force-include repos that would otherwise be filtered out (archived/forks).
  include: []

  # Hybrid category source. Maps a repository name to one or more area topics.
  # The generator unions these with any area-* topics already set on the repo
  # on GitHub, so the catalog works before GitHub topics are applied.
  # A repo may appear under more than one area.
  categories:
    # Compute Infrastructure and SRE
    iac-examples:           [area-infrastructure-sre]
    aws-linux-memory-tools: [area-infrastructure-sre]
    AWS:                    [area-infrastructure-sre]
    fedora-notes:           [area-infrastructure-sre]

    # Playbooks and Skill Demonstration
    playbook:               [area-playbooks]

    # AI
    skills:                 [area-ai]
    skills-tui:             [area-ai]
    kevins-opinionated-skills: [area-ai]

    # Proof of Concept and Moonshot Projects
    moonshot-projects:      [area-proof-of-concept]
    my-sandbox:             [area-proof-of-concept]
    python-docker-fun:      [area-proof-of-concept]

    # Software Development
    humungit:               [area-software-development]
    dotfiles:               [area-software-development]

    # Distribution
    homebrew-tap:           [area-distribution]
    scoop-bucket:           [area-distribution]
    rpm:                    [area-distribution]
    apt:                    [area-distribution]

    # AI
    # (skills, skills-tui mapped above)

    # Tools
    ashpodder:              [area-tools]
    ddir:                   [area-tools]
    tools:                  [area-tools]
    unix-hacks:             [area-tools]

    # Applications
    pastebooks:             [area-applications]
    marktext-theme-gruvbox: [area-applications]
    matomo-platform-config: [area-applications]

    # Hardware
    discrete_io_linux:      [area-hardware]
    rx320-cli:              [area-amateur-radio]

    # Knowledge Management
    personal-knowledge-management: [area-knowledge-management]
    personal-context-management:   [area-knowledge-management]

    # Publishing and Markdown
    mydocs:                 [area-publishing-markdown]
    how-I-make-books-now:   [area-publishing-markdown]
    how-I-make-books-legacy: [area-publishing-markdown]
    line-reorder-gui:       [area-publishing-markdown]

    # Amateur Radio

    # Weather
    WXTools:                [area-weather]
    metar-tool:             [area-weather]
    get-wx:                 [area-weather]

    # Project and Task Management
    youtrack:               [area-project-management]
    vermilian:              [area-project-management]

    # Outliers
    kevinpinscoe.github.io: [area-outliers]
    .github:                [area-outliers]
    https-github.com-kevinpinscoe: [area-outliers]
    archives:               [area-outliers]

  # Optional per-repo description and ordering overrides. When no override
  # exists, the GitHub description is used.
  overrides:
    AWS:
      description: AWS infrastructure notes and examples.
    https-github.com-kevinpinscoe:
      description: Profile landing content for kevinpinscoe.
    matomo-platform-config:
      description: Examples of how I manage Matomo analytics tracking.
    skills:
      description: My personal directory of skills designed around a TUI to invoke them.
    skills-tui:
      description: A TUI based command line skills chooser to be executed by Claude Code.
    ashpodder:
      description: My version of bashpodder, named for Ash in the Evil Dead movies.
    ddir:
      description: Recursively compare two directories — reports missing files and shows side-by-side diffs on files that differ.
    kevins-opinionated-skills:
      description: Reusable skills built around Kevin's preferred tools, conventions, and ways of working.
    get-wx:
      description: A very simple Open-Meteo weather parser written in Go.
    metar-tool:
      description: A tool for obtaining and parsing weather observations and forecasts (METAR).
    tools:
      description: Linux and Mac tools I have created.
    unix-hacks:
      description: Unix hacks I have collected over the decades.
    line-reorder-gui:
      description: Reorder lines by drag and drop using a GUI.
    archives:
      description: Archive of old articles from the 1990s–mid-2000s, many still linked to.
    fedora-notes:
      description: Notes and observations on using Fedora KDE Plasma as a development desktop.
    how-I-make-books-legacy:
      description: How I make books (typically).
    how-I-make-books-now:
      description: My newer method of writing books using Pandoc, a manifest, and Markdown.
    mydocs:
      description: Source for kevininscoe.com/docs.
    youtrack:
      description: YouTrack workflows and scripts I created.
